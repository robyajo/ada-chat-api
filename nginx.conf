# ============================================================
# PATUIH BE — Nginx Configuration
# Letak: /etc/nginx/sites-available/patuih-services.lapeh.web.id
# ============================================================

upstream ada_chat_api {
    server 127.0.0.1:8800;
    keepalive 64;
}

server {
    listen 80;
    server_name patuih-services.lapeh.web.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name patuih-services.lapeh.web.id;

    ssl_certificate /etc/letsencrypt/live/patuih-services.lapeh.web.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/patuih-services.lapeh.web.id/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    location / {
        proxy_pass http://ada_chat_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /socket.io/ {
        proxy_pass http://ada_chat_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /api/docs {
        proxy_pass http://ada_chat_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        alias /srv/www/node/patuih-services.lapeh.web.id/patuih-be/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    access_log /var/log/nginx/patuih-api.access.log;
    error_log /var/log/nginx/patuih-api.error.log warn;
}
